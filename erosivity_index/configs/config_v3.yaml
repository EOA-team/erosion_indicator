stations_metadata_path: stations_data/metadata/ogd-smn_meta_stations.csv
ei_dir: stations_data/stations_EIdaily_percent
covariates_dir: covariates
dem_file_pattern: dem

# All covariates plus grid coordinates (x, y) as explicit spatial features.
# x and y are in LV95 (EPSG:2056), units: metres.
data_vars:
  - prec_daily_avg
  - prec_monthly_avg
  - prec_monthly_min
  - prec_monthly_max
  - monthly_avg_temp
  - elev
  - slope
  - aspect
  - doy
  - prec_daily_fraction
  - x
  - y

pred_col: EI_daily_avg
model_type: rf
tune: true

date_str: "20260423"
version_tag: v3
